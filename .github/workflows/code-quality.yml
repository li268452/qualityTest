# ==========================================
# 代码质量管理系统 - GitHub Actions 工作流
# ==========================================
# 仓库：https://github.com/li268452/qualityTest
# 适用：GitHub + 本地/云端 SonarQube

name: Code Quality Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# 环境变量配置
env:
  NODE_VERSION: '18'
  SONAR_PROJECT_KEY: qualityTest

# 并发控制
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # 阶段1：所有分支 - ESLint 快速检查
  # ==========================================
  eslint-check:
    name: 🔍 ESLint 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 运行 ESLint 检查
        run: npm run lint

      - name: 📋 ESLint 检查结果
        if: always()
        run: |
          {
            echo "### 🔍 ESLint 代码检查结果"
            echo ""
            echo "| 检查项 | 结果 |"
            echo "|--------|------|"
            if [ "${{ job.status }}" == "success" ]; then
              echo "| 代码规范 | ✅ 通过 |"
            else
              echo "| 代码规范 | ❌ 失败 |"
            fi
            echo ""
            if [ "${{ job.status }}" != "success" ]; then
              echo "#### 📝 修复建议"
              echo "请运行 \`npm run lint:fix\` 自动修复问题"
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # 阶段2：主分支 & PR - SonarQube 质量扫描
  # ==========================================
  sonarqube-scan:
    name: 📊 SonarQube 质量扫描
    runs-on: ubuntu-latest
    needs: eslint-check
    # 只在 PR 或推送到主分支时运行
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master'
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: 🚀 SonarQube 扫描
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GIT_DEPTH: 0

      - name: 📋 SonarQube 扫描结果
        if: always()
        run: |
          {
            echo "### 📊 SonarQube 质量扫描"
            echo ""
            echo "| 项目 | ${{ env.SONAR_PROJECT_KEY }} |"
            echo "|:-----|:--------------------------|"
            echo "| 分支 | \`${{ github.ref_name }}\` |"
            echo "| 提交 | \`${{ github.sha }}\` |"
            echo "| 状态 | ${{ job.status == 'success' && '✅ 通过' || '❌ 失败' }} |"
            echo ""
            if [ -n "${{ secrets.SONAR_HOST_URL }}" ]; then
              echo "🔗 [查看详细报告](${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ env.SONAR_PROJECT_KEY }})"
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # 阶段3：质量门禁检查 - PR 合并保护
  # ==========================================
  quality-gate:
    name: 🚦 质量门禁检查
    runs-on: ubuntu-latest
    needs: [eslint-check, sonarqube-scan]
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: ✅ 检查质量门禁
        id: check
        run: |
          echo "### 🚦 质量门禁检查" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          failed=0

          # 检查 ESLint
          if [ "${{ needs.eslint-check.result }}" != "success" ]; then
            echo "#### ❌ ESLint 检查失败" >> $GITHUB_STEP_SUMMARY
            echo "代码不符合 ESLint 规范，请修复后重新提交" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            failed=1
          fi

          # 检查 SonarQube
          if [ "${{ needs.sonarqube-scan.result }}" != "success" ]; then
            echo "#### ❌ SonarQube 质量门禁失败" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ secrets.SONAR_HOST_URL }}" ]; then
              echo "🔗 [查看详细报告](${{ secrets.SONAR_HOST_URL }}/dashboard?id=${{ env.SONAR_PROJECT_KEY }})" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            failed=1
          fi

          # 输出最终结果
          if [ $failed -eq 0 ]; then
            echo "#### ✅ 质量门禁通过" >> $GITHUB_STEP_SUMMARY
            echo "代码质量检查全部通过，可以合并" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 🎉 所有检查通过！" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "#### ⛔ 合并被阻止" >> $GITHUB_STEP_SUMMARY
            echo "请修复上述问题后再合并" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: 📊 质量报告摘要
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo ""
            echo "### 📈 质量趋势"
            echo ""
            echo "| 检查项 | 状态 |"
            echo "|:------|:----:|"
            echo "| ESLint | ${{ needs.eslint-check.result == 'success' && '✅' || '❌' }} |"
            echo "| SonarQube | ${{ needs.sonarqube-scan.result == 'success' && '✅' || '❌' }} |"
          } >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # 阶段4（可选）：代码格式检查
  # ==========================================
  format-check:
    name: 🎨 代码格式检查
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: 🎨 检查代码格式
        run: |
          # 检查是否有未格式化的文件
          npx prettier --check "**/*.{js,jsx,vue,css,md,json}" || {
            echo "::warning::发现未格式化的文件，请运行 'npm run format' 修复"
            exit 1
          }

      - name: 📋 格式检查结果
        if: always()
        run: |
          {
            echo "### 🎨 代码格式检查"
            echo ""
            if [ "${{ job.status }}" == "success" ]; then
              echo "✅ 所有文件格式正确"
            else
              echo "⚠️ 存在未格式化的文件"
              echo ""
              echo "请运行以下命令修复："
              echo "\`\`\`bash"
              echo "npm run format"
              echo "git add ."
              echo "git commit -m 'style: 修复代码格式'"
              echo "\`\`\`"
            fi
          } >> $GITHUB_STEP_SUMMARY
