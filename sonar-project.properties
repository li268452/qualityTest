# ==========================================
# SonarQube 配置文件
# ==========================================
# GitHub 仓库: https://github.com/li268452/qualityTest

# 项目基本信息
sonar.projectKey=qualityTest
sonar.projectName=Code Quality Test Project
sonar.projectVersion=1.0.0

# GitHub 关联配置
sonar.links.homepage=https://github.com/li268452/qualityTest
sonar.links.ci=https://github.com/li268452/qualityTest/actions
sonar.links.scm=https://github.com/li268452/qualityTest

# 源码配置
sonar.sources=src
sonar.sourceEncoding=UTF-8

# 排除不需要扫描的文件和目录
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/package-lock.json,\
  **/yarn.lock,\
  **/*.png,\
  **/*.jpg,\
  **/*.jpeg,\
  **/*.gif,\
  **/*.svg,\
  **/*.ico,\
  **/.github/**,\
  **/scripts/**

# JavaScript 配置
sonar.javascript.file.suffixes=.js,.jsx,.vue
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Vue 配置
sonar.vue.file.suffixes=.vue

# 排除测试文件
sonar.test.exclusions=**/test/**,**/spec/**,**/__tests__/**
sonar.coverage.exclusions=**/test/**,**/spec/**,**/__tests__/**

# ==========================================
# 质量门禁配置（在 SonarQube Web UI 中设置）
# ==========================================
# 默认使用 SonarQube Community 默认质量门禁
# 可以在 SonarQube Web UI 中创建自定义质量门禁
#sonar.qualitygate=default

# ==========================================
# GitHub 集成说明
# ==========================================
# 1. 在 GitHub 项目中配置 Secrets：
#    - SONAR_TOKEN: SonarQube 生成的用户 Token
#    - SONAR_HOST_URL: SonarQube 服务器地址
#
# 2. 获取 SonarQube Token：
#    - 登录 SonarQube
#    - 进入 My Account → Security
#    - 生成新 Token 并保存
#
# 3. 配置 SONAR_HOST_URL：
#    - 本地 SonarQube: http://localhost:9000
#    - 云端 SonarQube: https://sonarcloud.io
#    - 使用 ngrok: https://xxx.ngrok.io
